ai_usage_summary: |
  Used Cursor and Claude for architecture design and implementation.
  No candidate data was sent to external LLM APIs during ranking.
  All scoring is deterministic — no LLM inference at rank time.

methodology_summary: |
  Two-stage hybrid ranker: recall (BM25 top-5K + dense embedding top-5K +
  strong-title union) followed by full recruiter-feature reranking on the
  recalled pool (~8-10K candidates).

  Merit score = weighted sum of: title alignment (0.24), semantic relevance
  (0.14, hybrid BM25+TF-IDF+dense cosine), skills fit (0.17, 26 core skills
  with trust scoring), summary IR markers (0.13), career IR markers (0.10),
  career quality (0.12, product vs consulting + production evidence),
  YOE fit (0.04, Gaussian at 6.5y), location+work-mode (0.03), tail signals
  (0.03, GitHub, assessments, education).

  Final composite = merit × availability × disqualifier × authenticity.
  Availability uses response rate, open-to-work, recency, notice period,
  offer acceptance rate, and response time. Disqualifiers penalize
  research-only, consulting-only, CV/speech-without-IR, LangChain-tourist,
  and career-inconsistent profiles. Authenticity detects honeypot profiles
  via timeline analysis, skill inflation, and verification signals.

  Dense embeddings precomputed offline with all-MiniLM-L6-v2 (384-dim).
  Ranking is CPU-only, no network, completes in ~2 min on 100K candidates.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
